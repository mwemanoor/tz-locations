name = "address-tz-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "address-tz-db"
database_id = "YOUR_DATABASE_ID"  # Replace after `wrangler d1 create address-tz-db`
migrations_dir = "src/db/migrations"
